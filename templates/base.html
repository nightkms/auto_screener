<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>AutoScreener</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    /* Taste-skills 적용: 일관 간격, 명료한 hierarchy, 절제된 색 */
    :root {
      --bg: #f5f6f8;
      --card: #ffffff;
      --border: #e3e6eb;
      --ink: #1f232a;
      --ink-muted: #6c727d;
      --strong: #137a3a;
      --strong-bg: #e8f5ee;
      --watch: #b07900;
      --watch-bg: #fdf5e0;
      --interest: #5c6470;
      --interest-bg: #eef0f3;
      --skip: #9aa0a8;
      --accent: #0d6efd;
    }
    body { background: var(--bg); color: var(--ink); font-feature-settings: "tnum"; }
    code, .mono { font-family: ui-monospace, "Cascadia Mono", Consolas, monospace; }

    .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .panel-head {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: baseline;
    }
    .panel-head h6 { margin: 0; font-size: 13px; font-weight: 700;
                     letter-spacing: .02em; text-transform: uppercase;
                     color: var(--ink); }
    .panel-head .meta { font-size: 11px; color: var(--ink-muted); }
    .panel-body { padding: 0; overflow-y: auto; flex: 1; min-height: 0; }
    .panel-scroll { max-height: 360px; }
    .panel-scroll-lg { max-height: 480px; }

    table.compact { margin: 0; font-size: 13px; }
    table.compact thead th {
      font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: .03em;
      color: var(--ink-muted); border-bottom: 1px solid var(--border);
      padding: 6px 10px; background: #fafbfc; position: sticky; top: 0;
    }
    table.compact tbody td {
      padding: 6px 10px; border-bottom: 1px solid #f0f1f4;
      vertical-align: middle;
    }
    table.compact tbody tr:last-child td { border-bottom: 0; }
    table.compact tbody tr:hover { background: #f8f9fb; }

    .name { font-weight: 600; }
    .muted { color: var(--ink-muted); font-size: 12px; }

    .grade-pill {
      display: inline-block; padding: 1px 8px; border-radius: 4px;
      font-size: 11px; font-weight: 700; letter-spacing: .02em;
    }
    .grade-STRONG   { background: var(--strong-bg); color: var(--strong); }
    .grade-WATCH    { background: var(--watch-bg);  color: var(--watch); }
    .grade-INTEREST { background: var(--interest-bg); color: var(--interest); }
    .grade-SKIP     { background: #f3f4f6; color: var(--skip); }
    .grade-crashed  { background: #fde8e8; color: #b91c1c; }

    .stat-card { background: var(--card); border: 1px solid var(--border);
                  border-radius: 8px; padding: 12px 14px; }
    .stat-num { font-size: 22px; font-weight: 700; line-height: 1; }
    .stat-label { font-size: 11px; color: var(--ink-muted); margin-top: 4px;
                   text-transform: uppercase; letter-spacing: .04em; }

    pre.markdown { background: var(--card); border: 1px solid var(--border);
                    border-radius: 8px; padding: 1rem;
                    white-space: pre-wrap; word-break: break-all;
                    font-family: 'Malgun Gothic', ui-monospace, monospace;
                    max-height: 70vh; overflow-y: auto; }

    #search-box { position: relative; }
    #search-results { position: absolute; top: 100%; left: 0; right: 0;
                       background: var(--card); border: 1px solid var(--border);
                       border-radius: 6px; z-index: 1000;
                       max-height: 320px; overflow-y: auto;
                       display: none; box-shadow: 0 4px 12px rgba(0,0,0,.08);
                       margin-top: 4px; }
    #search-results .item { padding: 8px 12px; cursor: pointer;
                             border-bottom: 1px solid #f3f4f6; }
    #search-results .item:hover { background: #eef4ff; }
    #search-results .item:last-child { border-bottom: 0; }

    .queue-status { font-size: 11px; padding: 1px 7px; border-radius: 4px;
                     font-weight: 600; text-transform: uppercase; }
    .queue-pending    { background: #eef0f3; color: var(--interest); }
    .queue-processing { background: #e6f1ff; color: var(--accent); }
    .queue-failed     { background: #fde8e8; color: #b91c1c; }
    .queue-retry      { background: #fef3c7; color: #92400e; }  /* attempts>0 강조 */

    /* 우측 하단 floating 큐 위젯 */
    .queue-floating {
      position: fixed; bottom: 16px; right: 16px; width: 280px;
      max-height: 50vh; background: var(--card);
      border: 1px solid var(--border); border-radius: 8px;
      box-shadow: 0 6px 20px rgba(0,0,0,.15);
      z-index: 999; overflow: hidden;
      display: flex; flex-direction: column;
    }
    .queue-floating .panel-head {
      background: #1f232a; color: #fff; padding: 6px 10px;
      border-bottom: 1px solid #2c313a;
    }
    .queue-floating .panel-head h6 { color: #fff; }
    .queue-floating .panel-head .meta { color: #c0c5cd; }
    .queue-floating .panel-body { max-height: calc(50vh - 38px); overflow-y: auto; }
    .queue-floating table.compact tbody td { padding: 4px 8px; font-size: 12px; }
    .queue-floating .toggle-btn {
      background: transparent; border: 0; color: #c0c5cd; cursor: pointer;
      font-size: 13px; padding: 0 4px;
    }
    .queue-floating.collapsed .panel-body { display: none; }

    .page-link.active { background: var(--accent); color: #fff; }

    .grade-filter {
      padding: 8px 14px; border-bottom: 1px solid var(--border);
      display: flex; flex-wrap: wrap; align-items: center;
      gap: 6px; background: #fafbfc;
    }
    .grade-chip {
      display: inline-block; padding: 2px 10px;
      font-size: 11px; font-weight: 600; letter-spacing: .02em;
      border-radius: 999px; text-decoration: none;
      border: 1px solid var(--border); background: #fff;
      color: var(--ink-muted); transition: all 0.15s;
    }
    .grade-chip:hover { border-color: var(--accent); color: var(--accent); }
    .grade-chip.active { background: var(--ink); color: #fff; border-color: var(--ink); }
    .grade-chip.grade-STRONG.active   { background: var(--strong); border-color: var(--strong); }
    .grade-chip.grade-WATCH.active    { background: var(--watch);  border-color: var(--watch); }
    .grade-chip.grade-INTEREST.active { background: var(--interest); border-color: var(--interest); }
    .grade-chip.grade-SKIP.active     { background: var(--skip);   border-color: var(--skip); }
  </style>
</head>
<body>
<nav class="navbar navbar-dark bg-dark mb-3">
  <div class="container">
    <a class="navbar-brand" href="/">AutoScreener</a>
    <div class="d-flex align-items-center" style="flex:1; max-width:560px; margin:0 1rem;">
      <div id="search-box" style="flex:1;">
        <input id="search-input" type="search" class="form-control form-control-sm"
               placeholder="종목명 또는 코드로 검색해서 분석 큐에 추가" autocomplete="off">
        <div id="search-results"></div>
      </div>
    </div>
    <form action="/trigger" method="post" class="d-flex"
          onsubmit="this.querySelector('button').disabled=true; this.querySelector('button').innerText='큐 추가 중...';">
      <button type="submit" class="btn btn-warning btn-sm">
        ▶ 핫 종목 5개 큐 추가
      </button>
    </form>
  </div>
</nav>
<div class="container">{% block body %}{% endblock %}</div>

<script>
(function() {
  const input = document.getElementById('search-input');
  const box = document.getElementById('search-results');
  if (!input) return;
  let timer = null;

  function hide() { box.style.display = 'none'; box.innerHTML = ''; }
  function show(items) {
    if (!items.length) { hide(); return; }
    box.innerHTML = items.map(s => {
      const prefBadge = s.is_preferred
        ? ` <span style="background:#fdf5e0;color:#b07900;padding:1px 6px;border-radius:3px;font-size:10px;font-weight:600;margin-left:6px;">우선주</span>`
        : '';
      return `<form class="item" method="post" action="/queue/add" style="margin:0">
         <input type="hidden" name="ticker" value="${s.ticker}">
         <input type="hidden" name="name" value="${s.name.replace(/"/g, '&quot;')}">
         <button type="submit" style="all:unset; width:100%; display:block;">
           <span>${s.name}${prefBadge}</span>
           <span class="text-muted" style="float:right">${s.ticker}</span>
         </button>
       </form>`;
    }).join('');
    box.style.display = 'block';
  }

  input.addEventListener('input', () => {
    clearTimeout(timer);
    const q = input.value.trim();
    if (q.length < 1) { hide(); return; }
    timer = setTimeout(async () => {
      try {
        const r = await fetch('/api/search?q=' + encodeURIComponent(q));
        const items = await r.json();
        show(items);
      } catch(e) { hide(); }
    }, 200);
  });
  document.addEventListener('click', (e) => {
    if (!document.getElementById('search-box').contains(e.target)) hide();
  });
})();
</script>
</body>
</html>
