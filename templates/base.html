<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>AutoScreener</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    /* =====================================================================
       디자인 토큰 (taste-skills 적용)
       - 간격: 4의 배수만. 관련=좁게/그룹간=넓게.
       - 색: 중립이 일하고 accent는 양념. 등급색은 저채도 칩.
       - 타이포: 좁은 스케일, weight 2단계, 숫자는 tabular-nums 우측정렬.
       - 그룹 분리: 여백 > 보더 > 그림자(떠야 할 것만).
       ===================================================================== */
    :root {
      /* 간격 */
      --sp-1: 4px;  --sp-2: 8px;  --sp-3: 12px;
      --sp-4: 16px; --sp-6: 24px; --sp-8: 32px;
      /* 중립 색 (배경/텍스트 위계) */
      --bg: #f3f4f6;
      --card: #ffffff;
      --sunken: #f7f8fa;
      --border: #e6e9ee;          /* 저채도 구분선 */
      --border-2: #d9dde3;        /* 강조 구분선 */
      --ink: #181b20;             /* text-1 본문/주요숫자 */
      --ink-2: #5a616b;           /* text-2 라벨/보조 */
      --ink-muted: #969ca5;       /* text-3 캡션/메타/단위 */
      /* accent (단일) */
      --accent: #2563eb;
      --accent-bg: #eef4ff;
      /* 등급 (저채도 칩) */
      --strong: #157a3c;   --strong-bg: #e7f4ec;
      --watch:  #a87400;   --watch-bg:  #fbf2db;
      --interest: #586273; --interest-bg: #eef0f4;
      --skip:   #989ea7;   --skip-bg:   #f1f2f4;
      --danger: #c2342e;   --danger-bg: #fcebea;
      /* 변화량 (등급/평점 상승=초록, 하락=빨강) */
      --up: #157a3c;  --down: #c2342e;
      /* 모양 */
      --radius: 8px;  --radius-sm: 5px;  --radius-pill: 999px;
      --shadow-pop: 0 8px 24px rgba(20,23,28,.14);
      /* 모션 (시스템 통일) */
      --ease: cubic-bezier(.2, 0, .2, 1);
      --t-fast: 120ms;  --t-mid: 220ms;
      /* 타이포 스케일 */
      --fs-cap: 11px; --fs-meta: 12px; --fs-body: 13px;
      --fs-num: 14px; --fs-title: 19px;
    }

    /* ---- no-scroll 셸: 페이지 전체 스크롤 금지, 스크롤은 패널 안으로 ---- */
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0; overflow: hidden;
      display: flex; flex-direction: column;
      background: var(--bg); color: var(--ink);
      font-family: -apple-system, "Segoe UI", "Malgun Gothic",
                   "Apple SD Gothic Neo", system-ui, sans-serif;
      font-size: var(--fs-body); line-height: 1.45;
      font-feature-settings: "tnum";
      -webkit-font-smoothing: antialiased;
    }
    code, .mono {
      font-family: ui-monospace, "Cascadia Mono", Consolas, monospace;
      font-variant-numeric: tabular-nums;
    }
    .num { font-variant-numeric: tabular-nums; text-align: right; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-thumb { background: #d2d6dd; border-radius: 6px;
      border: 2px solid transparent; background-clip: content-box; }
    ::-webkit-scrollbar-thumb:hover { background: #b9bfc8; background-clip: content-box; }

    /* ---- 상단 바 ---- */
    .app-nav {
      flex: 0 0 auto;
      display: flex; align-items: center; gap: var(--sp-4);
      height: 52px; padding: 0 var(--sp-6);
      background: #14171c; color: #fff;
    }
    .app-nav .brand {
      font-size: 15px; font-weight: 700; letter-spacing: .01em;
      color: #fff; text-decoration: none; white-space: nowrap;
    }
    .app-nav .brand .dot { color: #5b9dff; }
    .app-nav .spacer { flex: 1; }

    /* ---- 메인 영역: 남는 높이를 채우고 내부에서만 스크롤 ---- */
    .app-main {
      flex: 1 1 auto; min-height: 0; overflow: hidden;
      padding: var(--sp-4) var(--sp-6);
      display: flex; flex-direction: column;
    }
    .page { flex: 1; min-height: 0; display: flex;
            flex-direction: column; gap: var(--sp-3); }
    .page-head {
      flex: 0 0 auto;
      display: flex; align-items: center; gap: var(--sp-3);
      justify-content: space-between;
    }
    .page-title { font-size: var(--fs-title); font-weight: 700;
                  margin: 0; letter-spacing: -.01em; }

    /* ---- 패널 ---- */
    .panel {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex; flex-direction: column; min-height: 0; overflow: hidden;
    }
    .panel-head {
      flex: 0 0 auto;
      padding: var(--sp-2) var(--sp-3);
      border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: baseline;
      gap: var(--sp-2); background: var(--sunken);
    }
    .panel-head h6 {
      margin: 0; font-size: var(--fs-cap); font-weight: 700;
      letter-spacing: .04em; text-transform: uppercase; color: var(--ink-2);
    }
    .panel-head .meta { font-size: var(--fs-cap); color: var(--ink-muted); }
    .panel-body { flex: 1 1 auto; min-height: 0; overflow-y: auto; padding: 0; }
    .panel-foot {
      flex: 0 0 auto; padding: var(--sp-2) var(--sp-3);
      border-top: 1px solid var(--border); background: var(--sunken);
    }
    .panel-scroll { flex: 1 1 auto; min-height: 0; }

    /* ---- 테이블 ---- */
    table.compact { margin: 0; width: 100%; font-size: var(--fs-body);
                    border-collapse: collapse; }
    table.compact thead th {
      font-size: var(--fs-cap); font-weight: 600;
      text-transform: uppercase; letter-spacing: .03em; color: var(--ink-muted);
      border-bottom: 1px solid var(--border);
      padding: var(--sp-2) var(--sp-3); background: var(--sunken);
      position: sticky; top: 0; z-index: 1; white-space: nowrap;
    }
    table.compact tbody td {
      padding: var(--sp-2) var(--sp-3);
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    table.compact tbody tr:last-child td { border-bottom: 0; }
    table.compact tbody tr { transition: background var(--t-fast) var(--ease); }
    table.compact tbody tr:hover { background: var(--sunken); }
    .num, td.num, th.num { font-variant-numeric: tabular-nums; text-align: right; }

    .name { font-weight: 600; color: var(--ink); }
    .name:hover { color: var(--accent); }
    .muted { color: var(--ink-muted); font-size: var(--fs-meta); }
    .empty { text-align: center; color: var(--ink-muted);
             padding: var(--sp-8) var(--sp-4); font-size: var(--fs-meta); }

    /* ---- 등급 칩 ---- */
    .grade-pill {
      display: inline-block; padding: 1px 8px; border-radius: var(--radius-sm);
      font-size: var(--fs-cap); font-weight: 700; letter-spacing: .02em;
      white-space: nowrap;
    }
    .grade-STRONG   { background: var(--strong-bg);   color: var(--strong); }
    .grade-WATCH    { background: var(--watch-bg);     color: var(--watch); }
    .grade-INTEREST { background: var(--interest-bg);  color: var(--interest); }
    .grade-SKIP     { background: var(--skip-bg);      color: var(--skip); }
    .grade-crashed  { background: var(--danger-bg);    color: var(--danger); }

    /* ---- 대시보드 레이아웃 (좌: 차트+최근분석 / 우: 강력매수+큐) ---- */
    .layout-grid {
      flex: 1 1 auto; min-height: 0; display: grid;
      grid-template-columns: minmax(0, 1fr) 384px;
      grid-template-rows: minmax(0, 1fr); gap: var(--sp-3); align-items: stretch;
    }
    .left-col  { min-height: 0; display: grid;
                 grid-template-rows: 190px minmax(0, 1fr); gap: var(--sp-3); }
    .right-col { min-height: 0; display: grid;
                 grid-template-rows: minmax(0, 1fr) auto; gap: var(--sp-3); }
    /* 분석 큐: 최대 5행은 스크롤 없이, 6행부터 스크롤. scrollbar-gutter로 스크롤바가
       생겨도 자리를 미리 확보해 x 버튼 위치가 밀리지 않게 한다. */
    #dash-queue .panel-body { max-height: 186px; scrollbar-gutter: stable; }

    /* ---- 콤보 차트 카드 ---- */
    .chart-card { background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); display: flex; flex-direction: column;
      min-height: 0; overflow: hidden; }
    .chart-head { flex: 0 0 auto; padding: var(--sp-2) var(--sp-3) 0;
      display: flex; justify-content: space-between; align-items: flex-start; gap: var(--sp-3); }
    .chart-kpi { font-size: 18px; font-weight: 700; line-height: 1.05;
      font-variant-numeric: tabular-nums; }
    .chart-kpi .unit { font-size: var(--fs-cap); font-weight: 600;
      color: var(--ink-muted); margin-left: 3px; }
    .chart-kpi .kpi-sep { font-size: 13px; font-weight: 600; color: var(--ink-2);
      margin-left: var(--sp-2); }
    .chart-legend { display: flex; gap: var(--sp-3); justify-content: flex-end;
      flex-wrap: wrap; }
    .chart-legend .lg { display: inline-flex; align-items: center; gap: 5px;
      font-size: var(--fs-cap); color: var(--ink-2); }
    .chart-legend .sw { width: 10px; height: 10px; border-radius: 2px;
      display: inline-block; border: 1px solid rgba(20,23,28,.12); }
    .chart-legend .sw-line { width: 14px; height: 0; border: 0;
      border-top: 2px solid var(--accent); border-radius: 0; }
    .chart-svg-wrap { flex: 1 1 auto; min-height: 0; padding: 2px var(--sp-2);
      position: relative; }
    .chart-svg-wrap .combo-glow { position: absolute; left: 0; top: 0;
      pointer-events: none; }

    /* 마크다운 보고서 스타일은 report.html에서 .markdown(렌더 컨테이너)로 정의 */

    /* ---- 검색 자동완성 ---- */
    #search-box { position: relative; width: 100%; max-width: 520px; }
    #search-input {
      background: #20242b; border: 1px solid #2c313a; color: #f0f2f5;
      border-radius: var(--radius-sm); font-size: var(--fs-meta);
      padding: 5px 10px; width: 100%; transition: border-color var(--t-fast);
    }
    #search-input::placeholder { color: #8b919b; }
    #search-input:focus { outline: none; border-color: #5b9dff; background: #252a32; }
    #search-results {
      position: absolute; top: calc(100% + 4px); left: 0; right: 0;
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius-sm); z-index: 1000;
      max-height: 340px; overflow-y: auto; display: none;
      box-shadow: var(--shadow-pop);
    }
    #search-results .item { padding: var(--sp-2) var(--sp-3); cursor: pointer;
                            border-bottom: 1px solid var(--border); color: var(--ink); }
    #search-results .item:hover { background: var(--accent-bg); }
    #search-results .item:last-child { border-bottom: 0; }

    /* ---- 버튼 (Bootstrap 위 미세 보정) ---- */
    .btn { transition: all var(--t-fast) var(--ease); }
    .btn-accent {
      background: var(--accent); color: #fff; border: 1px solid var(--accent);
      font-weight: 600; font-size: var(--fs-meta);
    }
    .btn-accent:hover { background: #1d4fd0; color: #fff; }
    .btn-hot {
      background: #fff; color: #14171c; border: 1px solid #3a3f48;
      font-weight: 600; font-size: var(--fs-meta); white-space: nowrap;
    }
    .btn-hot:hover { background: #f0f2f5; }

    /* ---- 큐 상태 / 선정근거 배지 ---- */
    .queue-status { font-size: var(--fs-cap); padding: 1px 7px;
                    border-radius: var(--radius-sm); font-weight: 600;
                    text-transform: uppercase; white-space: nowrap; }
    .queue-pending    { background: var(--interest-bg); color: var(--interest); }
    .queue-processing { background: var(--accent-bg);   color: var(--accent); }
    .queue-failed     { background: var(--danger-bg);   color: var(--danger); }
    .queue-retry      { background: #fef3c7; color: #92400e; }

    .pick-src { display: inline-block; margin-left: var(--sp-1);
                font-size: 10px; padding: 1px 6px; border-radius: var(--radius-sm);
                font-weight: 600; white-space: nowrap; vertical-align: middle; }
    .pick-search { background: var(--accent-bg); color: #1d4ed8; }
    .pick-upper  { background: var(--danger-bg); color: var(--danger); }
    .pick-quant  { background: #ffedd5; color: #c2410c; }
    .pick-zscore { background: var(--interest-bg); color: #4b5563; }
    .pick-manual { background: #ecfdf5; color: #047857; }

    /* ---- 페이지네이션 ---- */
    .pagination { margin: 0; }
    .page-link { color: var(--ink-2); border-color: var(--border);
                 font-size: var(--fs-meta); padding: 2px 8px; }
    .page-link:hover { background: var(--sunken); color: var(--accent); }
    .page-item.active .page-link { background: var(--accent); color: #fff;
                                   border-color: var(--accent); }

    /* ---- 등급 필터 + 칩 ---- */
    .grade-filter {
      flex: 0 0 auto;
      padding: var(--sp-2) var(--sp-3); border-bottom: 1px solid var(--border);
      display: flex; flex-wrap: wrap; align-items: center; gap: var(--sp-1);
      background: var(--sunken);
    }
    .grade-chip {
      display: inline-block; padding: 2px 10px; font-size: var(--fs-cap);
      font-weight: 600; letter-spacing: .02em; border-radius: var(--radius-pill);
      text-decoration: none; border: 1px solid var(--border); background: var(--card);
      color: var(--ink-2); transition: all var(--t-fast) var(--ease);
    }
    .grade-chip:hover { border-color: var(--accent); color: var(--accent);
                        text-decoration: none; }
    .grade-chip.active { background: var(--ink); color: #fff; border-color: var(--ink); }
    .grade-chip.grade-STRONG.active   { background: var(--strong); border-color: var(--strong); }
    .grade-chip.grade-WATCH.active    { background: var(--watch);  border-color: var(--watch); }
    .grade-chip.grade-INTEREST.active { background: var(--interest); border-color: var(--interest); }
    .grade-chip.grade-SKIP.active     { background: var(--skip);   border-color: var(--skip); }

    /* ---- 토스트 (좌측 하단, 3초 자동 소멸) ---- */
    .toast-stack {
      position: fixed; bottom: var(--sp-4); left: var(--sp-4); z-index: 1080;
      display: flex; flex-direction: column-reverse; gap: var(--sp-2);
      max-width: 420px;
    }
    .toast-msg {
      padding: 10px 14px; border-radius: var(--radius); font-size: var(--fs-body);
      color: #fff; box-shadow: var(--shadow-pop); word-break: break-all;
      opacity: 0; transform: translateY(12px);
      transition: opacity var(--t-mid) var(--ease), transform var(--t-mid) var(--ease);
    }
    .toast-msg.show { opacity: 1; transform: translateY(0); }
    .toast-success  { background: #15803d; }
    .toast-warning  { background: #b45309; }
    .toast-danger   { background: #b91c1c; }
  </style>
</head>
<body>
<nav class="app-nav">
  <a class="brand" href="/">Auto<span class="dot">·</span>Screener</a>
  <div id="search-box">
    <input id="search-input" type="search"
           placeholder="종목명 또는 코드로 검색해서 분석 큐에 추가" autocomplete="off">
    <div id="search-results"></div>
  </div>
  <div class="spacer"></div>
  <form action="/trigger" method="post" data-ajax data-busy="큐 추가 중…">
    <button type="submit" class="btn btn-sm btn-hot">▶ 핫 종목 5개 큐 추가</button>
  </form>
</nav>

<div class="toast-stack" id="toast-stack"></div>
<script>
// 토스트: 메시지 띄우고 3초 후 자동 소멸. block body 호출보다 먼저 정의돼야 함.
window.showToast = function (message, type) {
  const stack = document.getElementById('toast-stack');
  if (!stack) return;
  const el = document.createElement('div');
  el.className = 'toast-msg toast-' + (type || 'success');
  el.textContent = message;                 // textContent → XSS 안전
  stack.appendChild(el);
  requestAnimationFrame(() => el.classList.add('show'));
  setTimeout(() => {
    el.classList.remove('show');
    setTimeout(() => el.remove(), 250);
  }, 3000);
};
</script>

<script>
// ---------------------------------------------------------------------------
// AJAX 폼 제출 — data-ajax 폼은 전체 새로고침 대신 큐 목록(#dash-queue)만 부분 교체.
//  · 핫 종목 추가(/trigger), 수기 추가(/queue/add), 큐 삭제/일시정지/재개에 적용.
//  · 서버가 큐 partial+토스트를 JSON으로 주면 #dash-queue만 갈아끼우고 토스트를 띄운다.
//  · 위임(document)이라 검색 드롭다운·큐 partial이 동적으로 갈려도 그대로 동작.
//  · 응답이 JSON이 아니면(예외) showToast로 알리고, JS가 없으면 폼은 평소대로 동작.
// ---------------------------------------------------------------------------
document.addEventListener('submit', async (e) => {
  const form = e.target;
  if (!(form instanceof HTMLFormElement) || !form.hasAttribute('data-ajax')) return;
  if (e.defaultPrevented) return;     // confirm() 취소 등 다른 핸들러가 막았으면 중단
  e.preventDefault();

  const btn = form.querySelector('button[type=submit]') || form.querySelector('button');
  if (btn && btn.disabled) return;    // 중복 제출 방지
  const orig = btn ? btn.innerHTML : '';
  if (btn) { btn.disabled = true; if (form.dataset.busy) btn.textContent = form.dataset.busy; }

  const inDropdown = !!form.closest('#search-results');
  try {
    const r = await fetch(form.action, {
      method: (form.getAttribute('method') || 'post').toUpperCase(),
      headers: { 'X-Requested-With': 'fetch' },
      body: new FormData(form),
      cache: 'no-store',
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    const q = document.getElementById('dash-queue');
    if (q && typeof data.queue === 'string') q.innerHTML = data.queue;
    if (data.toast) showToast(data.toast, data.toast_type || 'success');
    if (inDropdown) {                 // 수기 추가 후 검색창·드롭다운 정리
      const box = document.getElementById('search-results');
      if (box) { box.style.display = 'none'; box.innerHTML = ''; }
      const si = document.getElementById('search-input');
      if (si) si.value = '';
    }
  } catch (err) {
    showToast('❌ 요청 실패 — 잠시 후 다시 시도하세요.', 'danger');
  } finally {
    // 큐 partial 교체로 사라진 버튼은 복구 불필요. 화면에 남은 버튼만 원복.
    if (btn && document.contains(btn)) { btn.disabled = false; btn.innerHTML = orig; }
  }
});
</script>

<main class="app-main">{% block body %}{% endblock %}</main>

<script>
(function() {
  const input = document.getElementById('search-input');
  const box = document.getElementById('search-results');
  if (!input) return;
  let timer = null;

  function hide() { box.style.display = 'none'; box.innerHTML = ''; }
  function show(items) {
    if (!items.length) { hide(); return; }
    box.innerHTML = items.map(s => {
      const prefBadge = s.is_preferred
        ? ` <span style="background:var(--watch-bg);color:var(--watch);padding:1px 6px;border-radius:3px;font-size:10px;font-weight:600;margin-left:6px;">우선주</span>`
        : '';
      return `<form class="item" method="post" action="/queue/add" data-ajax style="margin:0">
         <input type="hidden" name="ticker" value="${s.ticker}">
         <input type="hidden" name="name" value="${s.name.replace(/"/g, '&quot;')}">
         <button type="submit" style="all:unset; width:100%; display:block; cursor:pointer;">
           <span class="name">${s.name}${prefBadge}</span>
           <span class="muted mono" style="float:right">${s.ticker}</span>
         </button>
       </form>`;
    }).join('');
    box.style.display = 'block';
  }

  input.addEventListener('input', () => {
    clearTimeout(timer);
    const q = input.value.trim();
    if (q.length < 1) { hide(); return; }
    timer = setTimeout(async () => {
      try {
        const r = await fetch('/api/search?q=' + encodeURIComponent(q));
        const items = await r.json();
        show(items);
      } catch(e) { hide(); }
    }, 200);
  });
  document.addEventListener('click', (e) => {
    if (!document.getElementById('search-box').contains(e.target)) hide();
  });
})();
</script>
</body>
</html>
